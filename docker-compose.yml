services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medilink
      POSTGRES_USER: medilink
      POSTGRES_PASSWORD: medilink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medilink"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: medilink
      DB_PASSWORD: medilink
      JWT_SECRET: change-me-in-production-must-be-at-least-256-bits-long-secret-key
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://157.245.188.139:8081
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
